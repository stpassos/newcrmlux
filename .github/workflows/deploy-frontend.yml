name: Deploy Frontend → worker.century21lux.pt

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/deploy-frontend.bat'

jobs:
  deploy:
    name: Build & Deploy to worker.century21lux.pt
    runs-on: ubuntu-latest
    steps:
      - name: SSH → run deploy-frontend.bat
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WINDOWS_VPS_HOST }}
          username: ${{ secrets.WINDOWS_VPS_USER }}
          password: ${{ secrets.WINDOWS_VPS_PASSWORD }}
          command_timeout: 15m
          script_stop: true
          script: C:\newcrmlux-api\scripts\deploy-frontend.bat
