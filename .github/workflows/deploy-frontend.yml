name: Deploy Frontend → imodigital.pt

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    name: Build & Deploy to Plesk httpdocs
    runs-on: ubuntu-latest
    steps:
      - name: SSH → pull + npm build + copy to httpdocs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WINDOWS_VPS_HOST }}
          username: ${{ secrets.WINDOWS_VPS_USER }}
          password: ${{ secrets.WINDOWS_VPS_PASSWORD }}
          command_timeout: 15m
          script_stop: true
          script: |
            cd C:\newcrmlux-api && git pull origin main
            cd C:\newcrmlux-api\frontend && npm install && npm run build
            xcopy /E /Y /I C:\newcrmlux-api\frontend\dist\* C:\inetpub\vhosts\imodigital.pt\httpdocs\
