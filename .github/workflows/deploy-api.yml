name: Deploy API → Windows VPS

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'schema.sql'
      - 'migration_*.sql'

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - name: SSH → fetch + reset + npm install + pm2 restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WINDOWS_VPS_HOST }}
          username: ${{ secrets.WINDOWS_VPS_USER }}
          password: ${{ secrets.WINDOWS_VPS_PASSWORD }}
          script_stop: true
          script: C:\newcrmlux-api\scripts\deploy-api.bat
